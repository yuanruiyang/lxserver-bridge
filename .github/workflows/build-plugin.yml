name: Build Plugin

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build zip plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run regression checks
        run: npm run regression

      - name: Run UI checks
        run: npm run ui-check

      - name: Build plugin
        run: npm run build

      - name: Validate built plugin
        run: npm run validate

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: lx-sync-server-jsplugin-${{ github.sha }}
          path: dist/lx-sync-server.jsplugin.zip
          if-no-files-found: error
          retention-days: 30

      - name: Publish latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: latest
          ZIP_PATH: dist/lx-sync-server.jsplugin.zip
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG" --force

          cat > release-notes.md <<EOF
          Latest build from main.

          Commit: $GITHUB_SHA
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "Latest build" \
              --notes-file release-notes.md
          else
            gh release create "$RELEASE_TAG" \
              --title "Latest build" \
              --notes-file release-notes.md
          fi

          gh release upload "$RELEASE_TAG" "$ZIP_PATH" --clobber
